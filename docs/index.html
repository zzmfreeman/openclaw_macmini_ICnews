<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Semi Brief</title>
  <style>
    :root{
      --bg:#0b1020; --panel:#111a33; --panel2:#0f1730; --text:#e8eeff; --muted:#a9b3d6;
      --accent:#6ee7ff; --accent2:#a78bfa; --good:#22c55e; --warn:#fbbf24; --bad:#fb7185;
      --chip:#1f2a4d; --border:rgba(255,255,255,.08);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
    }
    html,body{height:100%}
    body{margin:0;background:radial-gradient(1200px 700px at 15% 5%, rgba(110,231,255,.18), transparent 60%),
                     radial-gradient(900px 600px at 95% 20%, rgba(167,139,250,.18), transparent 55%),
                     var(--bg); color:var(--text); font-family:var(--sans);}
    a{color:var(--accent); text-decoration:none}
    a:hover{text-decoration:underline}
    .wrap{max-width:1100px;margin:0 auto;padding:28px 18px 60px}
    .topbar{display:flex; gap:14px; align-items:flex-end; justify-content:space-between; flex-wrap:wrap; margin-bottom:20px}
    .title{font-size:24px; font-weight:800; letter-spacing:-.5px; background:linear-gradient(to right, #fff, #a5b4fc); -webkit-background-clip:text; -webkit-text-fill-color:transparent}
    .meta{color:var(--muted); font-size:13px; display:flex; gap:10px; flex-wrap:wrap; margin-top:6px}
    .pill{background:rgba(255,255,255,.06); border:1px solid var(--border); padding:3px 10px; border-radius:6px; font-family:var(--mono); font-size:12px}
    
    /* Grid Layout Update: More balanced, headlines take full width on mobile */
    .grid{display:grid; grid-template-columns: 2fr 1fr; gap:18px; margin-top:20px}
    @media (max-width: 900px){.grid{grid-template-columns:1fr}}

    .card{background:linear-gradient(180deg, rgba(30,41,59,.4), rgba(15,23,42,.4)); border:1px solid var(--border);
          border-radius:12px; overflow:hidden; display:flex; flex-direction:column}
    .card h2{margin:0; padding:12px 16px; font-size:14px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:1px;
             border-bottom:1px solid var(--border); background:rgba(255,255,255,.02)}
    .card .body{padding:14px; display:flex; flex-wrap:wrap; gap:8px; align-content:flex-start}

    .toc{display:flex; gap:8px; flex-wrap:wrap}
    .toc a{background:var(--chip); border:1px solid var(--border); padding:6px 12px; border-radius:8px; color:var(--text); font-size:13px; font-weight:500}
    
    /* Headline List Optimized */
    .headline-list{display:flex; flex-direction:column; gap:8px; width:100%}
    .headline{padding:10px 12px; border-radius:8px; background:rgba(255,255,255,.03); border:1px solid transparent; transition:all .2s}
    .headline:hover{background:rgba(255,255,255,.06); border-color:var(--border)}
    .headline .t{font-weight:600; font-size:15px; line-height:1.4; color:#fff}
    .headline .s{margin-top:4px; color:var(--muted); font-size:12px; display:flex; gap:8px; align-items:center}
    
    .badge{font-family:var(--sans); font-weight:500; font-size:11px; padding:2px 8px; border-radius:4px; border:1px solid var(--border); background:rgba(255,255,255,.08); color:var(--text)}
    .badge.domestic{background:rgba(14,165,233,.15); color:#38bdf8; border-color:rgba(14,165,233,.3)}
    .badge.overseas{background:rgba(139,92,246,.15); color:#c4b5fd; border-color:rgba(139,92,246,.3)}

    .section{margin-top:32px}
    .section h3{margin:0 0 16px; font-size:20px; font-weight:700; color:var(--text); display:flex; align-items:center; gap:10px}
    .section h3::before{content:''; display:block; width:4px; height:18px; background:var(--accent); border-radius:2px}

    /* Item Card Optimization: Hierarchy & Contrast */
    .item{margin-bottom:20px; padding:20px; border-radius:12px; border:1px solid var(--border); background:rgba(30,41,59,.3); transition:transform .2s}
    .item:hover{border-color:rgba(255,255,255,.15)}
    
    .item .header{margin-bottom:12px}
    .item .title2{font-size:20px; font-weight:700; line-height:1.35; color:#fff; margin-bottom:8px} /* Bigger Title */
    .item .meta-row{display:flex; gap:12px; align-items:center; flex-wrap:wrap; font-size:12px; color:var(--muted); font-family:var(--mono)}
    .item .meta-row a{color:var(--accent); text-decoration:none; border-bottom:1px dotted var(--accent)}
    
    .summary{font-size:15px; line-height:1.7; color:rgba(226,232,240,.9); margin-bottom:16px; background:rgba(0,0,0,.15); padding:12px; border-radius:8px} /* Smaller/Contrast Content */
    
    .blocks{display:grid; grid-template-columns:1fr 1fr; gap:12px}
    @media (max-width: 700px){.blocks{grid-template-columns:1fr}}
    
    .insight-box, .action-box{padding:14px; border-radius:10px; border:1px solid rgba(255,255,255,.06); font-size:14px; line-height:1.6}
    .insight-box{background:rgba(16, 185, 129, .06); border-color:rgba(16, 185, 129, .15)}
    .insight-box .lbl{color:#34d399; font-weight:700; font-size:11px; text-transform:uppercase; margin-bottom:6px; letter-spacing:1px}
    
    .action-box{background:rgba(245, 158, 11, .06); border-color:rgba(245, 158, 11, .15)}
    .action-box .lbl{color:#fbbf24; font-weight:700; font-size:11px; text-transform:uppercase; margin-bottom:6px; letter-spacing:1px}
    
    ul{margin:0; padding-left:16px}
    li{margin-bottom:4px}

    .foot{margin-top:22px; color:var(--muted); font-size:12px}
    .warnbox{margin-top:10px; padding:10px 12px; border-radius:12px; background:rgba(251,191,36,.08); border:1px solid rgba(251,191,36,.22)}
    .search{display:flex; gap:10px; align-items:center; flex-wrap:wrap}
    input{background:rgba(255,255,255,.04); border:1px solid var(--border); border-radius:10px; padding:10px 12px; color:var(--text); min-width:240px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <div class="title">Semi Brief（AI / Crypto · Foundry / IP / EDA）</div>
        <div class="meta">
          <span class="pill" id="asof">As of: -</span>
          <span class="pill" id="window">Window: last 72h</span>
          <span class="pill" id="count">Items: -</span>
        </div>
      </div>
      <div class="search">
        <input id="q" placeholder="搜索标题/摘要/洞见/关键词…"/>
        <div class="toc">
          <a href="#domestic">国内</a>
          <a href="#overseas">国外</a>
        </div>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>今日标题总览</h2>
        <div class="body">
          <div class="headline-list" id="headlines"></div>
        </div>
      </div>
      <div class="card">
        <h2>本期关键词</h2>
        <div class="body" id="keywords"></div>
        <div class="body warnbox" id="notes" style="display:none"></div>
      </div>
    </div>

    <div class="section" id="domestic">
      <h3>国内（中文媒体）</h3>
      <div id="domesticItems"></div>
    </div>

    <div class="section" id="overseas">
      <h3>国外（英文媒体）</h3>
      <div id="overseasItems"></div>
    </div>

    <div class="foot" id="footer"></div>
  </div>

  <script>
    const state = { data: null, filtered: null };

    const el = (id)=>document.getElementById(id);
    const escapeHtml = (s)=>String(s||'').replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));

    function render(){
      const d = state.filtered || state.data;
      if(!d) return;
      el('asof').textContent = `As of: ${d.asOf || '-'}`;
      el('count').textContent = `Items: ${(d.items||[]).length}`;

      // keywords
      el('keywords').innerHTML = (d.keywords||[]).map(k=>`<span class="badge">${escapeHtml(k)}</span>`).join(' ');
      if(d.notes){
        el('notes').style.display='block';
        el('notes').innerHTML = `<b>说明</b><div style="margin-top:6px;line-height:1.5">${escapeHtml(d.notes)}</div>`;
      }

      // headlines
      el('headlines').innerHTML = (d.items||[]).map((it,idx)=>{
        const badge = it.region==='domestic' ? 'domestic' : 'overseas';
        const badgeText = it.region==='domestic' ? '国内' : '国外';
        return `
          <div class="headline">
            <div class="t"><span class="badge ${badge}">${badgeText}</span> ${escapeHtml(it.title)}</div>
            <div class="s">
              <span class="kv">${escapeHtml(it.source||'')}</span>
              <span class="kv">${escapeHtml(it.published||'')}</span>
              ${it.url ? `<a class="kv" href="${escapeHtml(it.url)}" target="_blank" rel="noreferrer">link</a>`:''}
            </div>
          </div>`;
      }).join('');

      const renderItem = (it, idx)=>{
        return `
          <div class="item">
            <div class="header">
              <div class="title2">${escapeHtml(it.title)}</div>
              <div class="meta-row">
                <span>#${idx+1}</span>
                <span>${escapeHtml(it.source||'')}</span>
                <span>${escapeHtml(it.published||'')}</span>
                ${it.url ? `<a href="${escapeHtml(it.url)}" target="_blank" rel="noreferrer">原文链接 ↗</a>`:''}
                ${(it.tags||[]).map(t=>`<span class="badge">${escapeHtml(t)}</span>`).join(' ')}
              </div>
            </div>
            
            <div class="summary">${escapeHtml(it.summary||'').replace(/\n/g,'<br/>')}</div>
            
            <div class="blocks">
              <div class="insight-box">
                <div class="lbl">⚡ 行业洞见</div>
                <ul>${[].concat(it.insights||[]).map(x=>`<li>${escapeHtml(x)}</li>`).join('')}</ul>
              </div>
              <div class="action-box">
                <div class="lbl">🎯 建议动作</div>
                <ul>${[].concat(it.actions||[]).map(x=>`<li>${escapeHtml(x)}</li>`).join('')}</ul>
              </div>
            </div>
          </div>`;
      };

      const domestic = (d.items||[]).filter(x=>x.region==='domestic');
      const overseas = (d.items||[]).filter(x=>x.region==='overseas');
      el('domesticItems').innerHTML = domestic.map(renderItem).join('');
      el('overseasItems').innerHTML = overseas.map(renderItem).join('');

      el('footer').textContent = d.footer || '';
    }

    function applyFilter(q){
      q = (q||'').trim().toLowerCase();
      if(!q){ state.filtered=null; render(); return; }
      const d = state.data;
      const items = (d.items||[]).filter(it=>{
        const hay = [it.title,it.source,it.published,it.summary,(it.insights||[]).join(' '),(it.actions||[]).join(' '),(it.tags||[]).join(' '),(d.keywords||[]).join(' ')].join(' ').toLowerCase();
        return hay.includes(q);
      });
      state.filtered = {...d, items};
      render();
    }

    el('q').addEventListener('input', (e)=>applyFilter(e.target.value));

    fetch('./brief.json', {cache:'no-store'}).then(r=>r.json()).then(j=>{state.data=j; render();}).catch(err=>{
      el('headlines').innerHTML = `<div class="warnbox">无法加载 brief.json：${escapeHtml(err.message||String(err))}</div>`;
    });
  </script>
</body>
</html>
