<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>半导体简报 · ICnews</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#fffbeb; /* Warmer background for midday */
      --panel:#ffffff; --text:#1e293b; --muted:#64748b;
      --accent:#f59e0b; /* Amber accent for flash */
      --tag-bg:#f1f5f9; --tag-text:#475569;
      --card-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      --sans: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", sans-serif;
    }
    body{margin:0; background:var(--bg); color:var(--text); font-family:var(--sans)}
    
    .wrap{max-width:1100px;margin:0 auto;padding:20px 24px 40px}
    .topbar{margin-bottom:16px; border-bottom:1px solid var(--border); padding-bottom:14px; text-align:center}
    .title{font-size:22px; font-weight:700; color:#1e293b; letter-spacing:-0.5px; margin-bottom:6px}
    .meta{display:flex; justify-content:center; gap:14px; font-size:13px; opacity:0.9; color:var(--muted)}
    .pill{background:#fff; border:1px solid #cbd5e1; padding:4px 12px; border-radius:999px; color:#475569; font-weight:500}

    /* Grid Layout */
    .grid-main{display:grid; grid-template-columns: 1fr; gap:32px}
    
    /* Headlines Section (Top Grid) */
    .headline-card{background:#fff; border:1px solid #e2e8f0; border-radius:12px; box-shadow:0 4px 6px -1px rgb(0 0 0 / 0.05); padding:20px}
    .headline-card h2{margin:0; padding:0 0 16px; margin-bottom:16px; background:none; font-size:18px; font-weight:700; color:#334155; border-bottom:2px solid #2563eb}
    .headline-list{display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:16px; padding:0}
    .headline{background:#f8fafc; border:1px solid #e2e8f0; padding:16px; border-radius:8px; transition:transform 0.2s, box-shadow 0.2s; display:block; text-decoration:none; color:inherit}
    .headline:hover{transform:translateY(-2px); box-shadow:0 4px 6px -1px rgb(0 0 0 / 0.1); background:#fff}
    .headline .t{font-size:15px; font-weight:600; color:#1e293b; line-height:1.5}
    .headline .s{font-size:12px; color:#94a3b8; margin-top:4px}
    
    /* Keyword Row */
    .keyword-row{margin-bottom:24px; padding:16px; background:#fff; border:1px solid #e2e8f0; border-radius:8px; display:flex; flex-wrap:wrap; gap:8px; align-items:center}
    .kw-label{font-size:13px; font-weight:700; color:#64748b; text-transform:uppercase; margin-right:12px}
    
    /* Item Card Styling (Mimicking Reference) */
    .item{background:#fff; border:none; border-left:4px solid #2563eb; border-radius:8px; padding:24px; margin-bottom:24px; box-shadow:0 2px 4px rgb(0 0 0 / 0.05); transition:transform 0.2s}
    .item:hover{transform:translateX(4px); box-shadow:0 4px 6px rgb(0 0 0 / 0.08)}
    
    .item .header{margin-bottom:16px}
    .item .title2{font-size:22px; font-weight:600; color:#1e293b; margin-bottom:10px; line-height:1.4}
    .item .meta-row{display:flex; gap:12px; align-items:center; flex-wrap:wrap; font-size:13px; color:#64748b}
    .item .meta-row a{color:#2563eb; text-decoration:none; font-weight:500}
    .item .meta-row a:hover{text-decoration:underline}
    
    .badge{font-size:12px; padding:2px 10px; border-radius:12px; font-weight:500; border:none; display:inline-block}
    .badge.domestic{background:#eff6ff; color:#1d4ed8} /* Blue tint */
    .badge.overseas{background:#f5f3ff; color:#7c3aed} /* Purple tint */
    .badge-tag{background:#f1f5f9; color:#475569; border:1px solid #e2e8f0}
    
    /* Data & Timeline Section */
    .data-grid{display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-bottom:40px}
    @media (max-width: 700px){.data-grid{grid-template-columns:1fr}}
    
    .data-card{background:#fff; border:1px solid #e2e8f0; border-radius:12px; padding:20px; box-shadow:0 2px 4px rgb(0 0 0 / 0.05)}
    .data-card h3{margin:0 0 16px; font-size:16px; color:#1e293b; display:flex; align-items:center; gap:8px}
    
    .key-data-list{display:grid; gap:12px}
    .key-data-item{display:flex; justify-content:space-between; align-items:center; padding-bottom:8px; border-bottom:1px dashed #e2e8f0}
    .key-data-metric{color:#64748b; font-size:14px}
    .key-data-value{font-weight:700; color:#2563eb; font-size:16px}
    
    .timeline-list{border-left:2px solid #e2e8f0; padding-left:20px; margin-left:8px}
    .timeline-item{position:relative; margin-bottom:20px}
    .timeline-item::before{content:''; position:absolute; left:-25px; top:6px; width:8px; height:8px; background:#fff; border:2px solid #2563eb; border-radius:50%}
    .timeline-date{font-size:12px; color:#64748b; font-weight:700; margin-bottom:4px}
    .timeline-event{font-size:14px; color:#334155; line-height:1.5}

    .summary ul{margin:0; padding-left:18px}
    .summary li{margin-bottom:6px; color:#334155; line-height:1.6}
    @media (max-width: 700px){.blocks{grid-template-columns:1fr}}
    
    .box{padding:20px; border-radius:8px; font-size:15px; line-height:1.6; border:none}
    .box-insight{background:#fffbeb; border-left:3px solid #f59e0b; color:#92400e} /* Yellow/Amber for Insights */
    .box-insight .lbl{color:#b45309; font-weight:700; font-size:12px; text-transform:uppercase; margin-bottom:8px; letter-spacing:0.5px}
    
    .box-action{background:#f0fdf4; border-left:3px solid #10b981; color:#166534} /* Green for Actions */
    .box-action .lbl{color:#15803d; font-weight:700; font-size:12px; text-transform:uppercase; margin-bottom:8px; letter-spacing:0.5px}
    
    /* Glossary Section */
    .glossary-box{margin-top:20px; padding:16px; background:#f8fafc; border:1px dashed #cbd5e1; border-radius:8px}
    .glossary-title{font-size:12px; font-weight:700; color:#64748b; text-transform:uppercase; margin-bottom:8px; display:flex; align-items:center; gap:6px}
    .glossary-item{font-size:13px; color:#475569; margin-bottom:6px; line-height:1.5}
    .glossary-term{font-weight:700; color:#334155; background:#e2e8f0; padding:1px 6px; border-radius:4px; margin-right:6px; font-size:12px}

    .section-title{font-size:20px; font-weight:600; border-bottom:3px solid #2563eb; padding-bottom:8px; margin:40px 0 24px; color:#1e293b; display:inline-block; display:flex; align-items:center; gap:8px}
    
    ul{margin:0; padding-left:18px} 
    li{margin-bottom:6px; padding-left:4px}
    
    /* Search */
    .search-row{margin-bottom:16px}
    #q{width:100%; padding:12px 16px; border:1px solid #cbd5e1; border-radius:8px; font-family:inherit; background:#fff; font-size:14px; box-sizing:border-box}
    #q:focus{outline:none; border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,0.1)}
    
    .foot{margin-top:40px; text-align:center; color:#94a3b8; font-size:12px; padding-top:20px; border-top:1px solid #e2e8f0}
    
    /* Mobile tweaks */
    @media (max-width: 900px){
      .headline-list{grid-template-columns:1fr}
      .search-container-mobile{display:none !important}
    }

    /* 全局术语表 */
    .glossary-section{margin-top:48px; padding:28px; background:linear-gradient(135deg,#f0f9ff 0%,#e0f2fe 100%); border:1px solid #bae6fd; border-radius:16px}
    .glossary-section-title{font-size:18px; font-weight:700; color:#0369a1; margin-bottom:20px; display:flex; align-items:center; gap:8px; border-bottom:2px solid #7dd3fc; padding-bottom:12px}
    .glossary-grid{display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:14px}
    .glossary-card{background:#fff; border:1px solid #bae6fd; border-radius:10px; padding:14px 16px}
    .glossary-card-term{font-size:14px; font-weight:700; color:#0c4a6e; margin-bottom:6px; display:flex; align-items:center; gap:6px}
    .glossary-card-cat{font-size:10px; font-weight:600; background:#e0f2fe; color:#0369a1; padding:1px 7px; border-radius:10px; margin-left:auto}
    .glossary-card-desc{font-size:13px; color:#475569; line-height:1.6}

    /* ===== 话题追踪板块 ===== */
    .topic-section{margin-top:48px}
    .topic-section-header{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid #6366f1}
    .topic-section-title{font-size:20px;font-weight:700;color:#3730a3}
    .topic-section-sub{font-size:13px;color:#6b7280;margin-left:auto}
    .topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
    .topic-card{background:#fff;border:1px solid #e0e7ff;border-radius:12px;padding:18px 20px;position:relative;overflow:hidden;transition:box-shadow 0.2s,transform 0.2s}
    .topic-card:hover{box-shadow:0 4px 12px rgba(99,102,241,0.12);transform:translateY(-2px)}
    .topic-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--heat-color,#6366f1)}
    .topic-card.heat-up{--heat-color:#ef4444}
    .topic-card.heat-stable{--heat-color:#f59e0b}
    .topic-card.heat-down{--heat-color:#94a3b8}
    .topic-name{font-size:15px;font-weight:700;color:#1e293b;margin-bottom:8px;display:flex;align-items:center;gap:6px}
    .topic-heat{font-size:13px;font-weight:600;padding:2px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:3px}
    .heat-up .topic-heat{background:#fef2f2;color:#dc2626}
    .heat-stable .topic-heat{background:#fffbeb;color:#d97706}
    .heat-down .topic-heat{background:#f1f5f9;color:#64748b}
    .topic-summary{font-size:13px;color:#475569;line-height:1.6;margin:10px 0}
    .topic-signals{display:flex;flex-direction:column;gap:6px;margin-top:10px}
    .topic-signal{display:flex;align-items:flex-start;gap:6px;font-size:12px;color:#6b7280;background:#f8fafc;border-radius:6px;padding:6px 10px}
    .topic-signal .sig-icon{flex-shrink:0;margin-top:1px}
    .topic-signal .sig-text{line-height:1.5;color:#475569}
    .topic-signal .sig-text strong{color:#334155}
    .topic-empty{text-align:center;padding:40px;color:#94a3b8;font-size:14px;grid-column:1/-1}
    @media(max-width:700px){.topic-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <div class="title" id="page-title">📡 半导体简报</div><div id="buildmeta" style="margin-top:3px;font-size:12px;color:#64748b"></div>
        <div class="meta">
          <a href="index.html" class="pill">⬅️ 返回早报</a>
          <span id="asof">As of: -</span>
          <span id="window">Window: last 72h</span>
          <span id="count">Items: -</span>
        </div>
      </div>
    </div>

    <div class="grid-main">
      <!-- Search & Headlines -->
      <div class="sidebar">
        <div class="search-row">
          <input id="q" placeholder="🔍 搜索标题、摘要、洞见..." />
        </div>
        
        <div class="headline-card">
          <h2>🔥 今日标题总览</h2>
          <div class="headline-list" id="headlines"></div>
        </div>
      </div>

      <!-- Content Area -->
      <div>
        <!-- Keywords Row -->
        <div class="keyword-row">
          <div class="kw-label">🏷️ 本期关键词</div>
          <div id="keywords" style="display:contents"></div>
        </div>
        
        <!-- Data & Timeline -->
        <div class="data-grid" id="dataSection" style="display:none">
          <div class="data-card">
            <h3>📊 关键数据</h3>
            <div class="key-data-list" id="keyData"></div>
          </div>
          <div class="data-card">
            <h3>📅 产业时间线</h3>
            <div class="timeline-list" id="timeline"></div>
          </div>
        </div>

        <div class="warnbox" id="notes" style="display:none;margin-bottom:20px;padding:12px;background:#fff1f2;border:1px solid #fecdd3;border-radius:8px;color:#9f1239"></div>

        <div class="section-title" id="domestic">🇨🇳 国内（中文媒体）</div>
        <div id="domesticItems"></div>

        <div class="section-title" id="overseas">🌍 国外（英文媒体）</div>
        <div id="overseasItems"></div>
      </div>
    </div>


        <div id="topicSection" style="display:none"></div>
        <div id="glossarySection" style="display:none"></div>
    <div class="foot" id="footer">Generated by OpenClaw</div>
  </div>

  <script>
    const state = { data: null, filtered: null };

    const el = (id)=>document.getElementById(id);
    const escapeHtml = (s)=>String(s||'').replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

    function render(){
      const d = state.filtered || state.data;
      if(!d) return;
      
      if (!d.items) d.items = [];

      el('asof').textContent = `📅 更新时间: ${d.asOf || '-'}`;
      if (d.version || d.generatedAt || d.footer) {
        const pubAt = d.publishedAt ? `页面更新: ${d.publishedAt}` : (d.generatedAt ? `生成时间: ${d.generatedAt}` : '');
        const meta = d.footer || `${d.version||'-'}  ${pubAt}`;
        const bm = el('buildmeta'); if (bm) bm.textContent = meta;
      }
      el('count').textContent = `📊 新闻数量: ${(d.items||[]).length}`;

      // keywords
      el('keywords').innerHTML = (d.keywords||[]).map(k=>`<span class="badge badge-tag">${escapeHtml(k)}</span>`).join(' ');
      
      // Key Data & Timeline
      if(d.key_data && d.key_data.length){
        el('dataSection').style.display = 'grid';
        el('keyData').innerHTML = d.key_data.map(k=>`
          <div class="key-data-item">
            <span class="key-data-metric">${escapeHtml(k.metric)}</span>
            <span class="key-data-value">${escapeHtml(k.value)}</span>
          </div>`).join('');
      }
      if(d.timeline && d.timeline.length){
        el('timeline').innerHTML = d.timeline.map(t=>`
          <div class="timeline-item">
            <div class="timeline-date">${escapeHtml(t.date)}</div>
            <div class="timeline-event">${escapeHtml(t.event)}</div>
          </div>`).join('');
      }
      
      if(d.notes){
        el('notes').style.display='block';
        el('notes').innerHTML = `<b>⚠️ 说明</b><div style="margin-top:6px;line-height:1.5">${escapeHtml(d.notes)}</div>`;
      }

      const DOMESTIC_SOURCES = ['财联社','集微网','36氪','半导体行业观察','爱集微','界面新闻','第一财经','澎湃新闻','新浪科技','雷锋网','虎嗅','钛媒体','证券时报','上证报','中证报','新浪财经','Digitimes China','CSIA','中国电子报'];
      const isDomestic = (it) => {
        if(it.region === 'domestic') return true;
        if(it.region === 'overseas') return false;
        const src = (it.source||'').toLowerCase();
        return DOMESTIC_SOURCES.some(s => src.includes(s.toLowerCase()));
      };

      // 按国内/国际分组，保持组内原始顺序，拼成统一的有序列表
      const allItems = d.items || [];
      const domestic = allItems.filter(x=>isDomestic(x));
      const overseas = allItems.filter(x=>!isDomestic(x));
      // 最终显示顺序：国内在前，国际在后，各自保持原顺序
      const orderedItems = [...domestic, ...overseas];

      // 标题总览：按 orderedItems 顺序，分组显示
      let headlineHtml = '';
      if (domestic.length) {
        headlineHtml += `<div style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin:8px 0 4px;padding-left:4px;">🇨🇳 国内</div>`;
        headlineHtml += domestic.map((it, i) => `
          <a href="#item-${i}" class="headline">
            <div class="t">${escapeHtml(it.title)}</div>
            <div class="s">${escapeHtml(it.source||'')} · ${escapeHtml(it.published||'')}</div>
          </a>`).join('');
      }
      if (overseas.length) {
        headlineHtml += `<div style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin:12px 0 4px;padding-left:4px;">🌍 国际</div>`;
        headlineHtml += overseas.map((it, i) => `
          <a href="#item-${domestic.length + i}" class="headline">
            <div class="t">${escapeHtml(it.title)}</div>
            <div class="s">${escapeHtml(it.source||'')} · ${escapeHtml(it.published||'')}</div>
          </a>`).join('');
      }
      el('headlines').innerHTML = headlineHtml;

      // 正文渲染：使用 orderedItems 顺序，id 与总览锚点一一对应
      const renderItem = (it, idx)=>{
        return `
          <div class="item" id="item-${idx}">
            <div class="header">
              <div class="title2">${escapeHtml(it.title)}</div>
              <div class="meta-row">
                <span>#${idx+1}</span>
                <span>📰 ${escapeHtml(it.source||'')}</span>
                <span>📅 ${escapeHtml(it.published||'')}</span>
                ${it.url ? `<a href="${escapeHtml(it.url)}" target="_blank" rel="noreferrer">🔗 原文链接</a>`:''}
                ${(it.tags||[]).map(t=>`<span class="badge badge-tag">${escapeHtml(t)}</span>`).join(' ')}
              </div>
            </div>
            <div class="summary">${it.summary}</div>
            <div class="blocks">
              <div class="box box-insight">
                <div class="lbl">💡 行业洞见</div>
                <ul>${[].concat(it.insights||[]).map(x=>`<li>${escapeHtml(x)}</li>`).join('')}</ul>
              </div>
              <div class="box box-action">
                <div class="lbl">🎯 建议动作</div>
                <ul>${[].concat(it.actions||[]).map(x=>`<li>${escapeHtml(x)}</li>`).join('')}</ul>
              </div>
            </div>
          </div>
          ${it.glossary && it.glossary.length ? `
          <div class="glossary-box">
            <div class="glossary-title">📚 核心词条解读</div>
            ${it.glossary.map(g => `<div class="glossary-item"><span class="glossary-term">${escapeHtml(g.term)}</span>${escapeHtml(g.desc)}</div>`).join('')}
          </div>` : ''}`;
      };

      el('domesticItems').innerHTML = domestic.length
        ? domestic.map((it,i) => renderItem(it, i)).join('')
        : '<div class="warnbox">本期暂无国内媒体报道。</div>';
      el('overseasItems').innerHTML = overseas.length
        ? overseas.map((it,i) => renderItem(it, domestic.length + i)).join('')
        : '<div class="warnbox">本期暂无国际媒体报道。</div>';


      // 全局术语表
      const gl = d.glossary_list || [];
      if (gl.length) {
        const catColor = {封装:'#f0fdf4', 材料:'#fef3c7', 设备:'#fdf4ff', 存储:'#eff6ff', 商业:'#fff7ed'};
        const catBorder = {封装:'#86efac', 材料:'#fcd34d', 设备:'#d8b4fe', 存储:'#93c5fd', 商业:'#fdba74'};
        el('glossarySection').style.display = '';
        el('glossarySection').innerHTML = `
          <div class="glossary-section">
            <div class="glossary-section-title">📖 本期专业术语解析</div>
            <div class="glossary-grid">
              ${gl.map(g => `
                <div class="glossary-card" style="border-color:${catBorder[g.category]||'#bae6fd'}; background:${catColor[g.category]||'#fff'}">
                  <div class="glossary-card-term">
                    ${escapeHtml(g.term)}
                    ${g.category ? `<span class="glossary-card-cat">${escapeHtml(g.category)}</span>` : ''}
                  </div>
                  <div class="glossary-card-desc">${escapeHtml(g.desc)}</div>
                </div>`).join('')}
            </div>
          </div>`;
      }

      // 话题追踪板块
      const tp = d.topic_pulse || [];
      if (tp.length) {
        el('topicSection').style.display = '';
        const heatClass = (h) => {
          if (!h) return 'heat-stable';
          if (h.includes('↑')) return 'heat-up';
          if (h.includes('↓')) return 'heat-down';
          return 'heat-stable';
        };
        const heatLabel = (h) => h || '→平稳';
        el('topicSection').innerHTML = `
          <div class="topic-section">
            <div class="topic-section-header">
              <div class="topic-section-title">🔭 话题追踪</div>
              <div class="topic-section-sub">基于 Reddit · Hacker News 社区热度，持续追踪行业关键议题</div>
            </div>
            <div class="topic-grid">
              ${tp.map(t => {
                const cls = heatClass(t.heat);
                const hasReddit = t.reddit_top && t.reddit_top !== 'null' && t.reddit_top !== null;
                const hasHN = t.hn_top && t.hn_top !== 'null' && t.hn_top !== null;
                return `
                <div class="topic-card ${cls}">
                  <div class="topic-name">
                    ${escapeHtml(t.topic)}
                    <span class="topic-heat">${escapeHtml(heatLabel(t.heat))}</span>
                  </div>
                  <div class="topic-summary">${escapeHtml(t.summary || '')}</div>
                  <div class="topic-signals">
                    ${hasReddit ? `<div class="topic-signal"><span class="sig-icon">🔴</span><span class="sig-text"><strong>Reddit热帖：</strong>${escapeHtml(t.reddit_top)}</span></div>` : ''}
                    ${hasHN ? `<div class="topic-signal"><span class="sig-icon">🟠</span><span class="sig-text"><strong>HN：</strong>${escapeHtml(t.hn_top)}</span></div>` : ''}
                    ${!hasReddit && !hasHN ? `<div class="topic-signal"><span class="sig-icon">💤</span><span class="sig-text">本期社区信号较弱，暂无热帖</span></div>` : ''}
                  </div>
                </div>`;
              }).join('')}
            </div>
          </div>`;
      }
      el('footer').textContent = d.footer || 'Generated by OpenClaw · Data source: NewsAPI/Brave';
    }

    function applyFilter(q){
      q = (q||'').trim().toLowerCase();
      if(!q){ state.filtered=null; render(); return; }
      const d = state.data;
      const items = (d.items||[]).filter(it=>{
        const hay = [it.title,it.source,it.published,it.summary,(it.insights||[]).join(' '),(it.actions||[]).join(' '),(it.tags||[]).join(' '),(d.keywords||[]).join(' ')].join(' ').toLowerCase();
        return hay.includes(q);
      });
      state.filtered = {...d, items};
      render();
    }

    el('q').addEventListener('input', (e)=>applyFilter(e.target.value));

    // 根据当前时间自动选择最新时段简报
    function getBriefFile() {
      const now = new Date();
      const shanghaiStr = now.toLocaleString('en-US', {timeZone: 'Asia/Shanghai'});
      const shanghaiDate = new Date(shanghaiStr);
      const h = shanghaiDate.getHours();
      if (h >= 20) return 'brief_evening.json';
      if (h >= 13) return 'brief_midday.json';
      return 'brief.json';
    }

    function updatePageTitle(file) {
      const titles = {
        'brief.json':         { icon: '☀️', label: '早间半导体简报', bg: '#fefce8' },
        'brief_midday.json':  { icon: '🌤', label: '午间半导体简报', bg: '#fffbeb' },
        'brief_evening.json': { icon: '🌙', label: '晚间半导体简报', bg: '#f0f9ff' }
      };
      const t = titles[file] || titles['brief.json'];
      const titleEl = document.getElementById('page-title');
      if (titleEl) titleEl.textContent = t.icon + ' ' + t.label;
      document.title = t.label + ' · ICnews';
      document.body.style.setProperty('--bg', t.bg);
    }

    function loadBrief(file) {
      fetch('./' + file + '?t=' + Date.now(), {cache:'no-store'})
        .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
        .then(j => {
          const items = j.items || [];
          const isEmpty = items.length === 0;
          const isFake = items.some(function(it) {
            return (it.source || '').includes('示例') ||
              (it.title || '').includes('示例') ||
              (it.url || '').includes('example.com');
          });
          if (isEmpty || isFake) {
            const warn = isEmpty ? '本时段简报暂无数据。' : '⚠️ 本时段简报包含示例数据，实际采集失败。';
            el('headlines').innerHTML = '<div class="warnbox">' + warn + '</div>';
            if (items.length > 0) { state.data = j; render(); }
            return;
          }
          state.data = j;
          render();
        })
        .catch(function(err) {
          var fallbacks = {'brief_evening.json':'brief_midday.json','brief_midday.json':'brief.json','brief.json':null};
          var next = fallbacks[file];
          if (next) {
            loadBrief(next);
          } else {
            el('headlines').innerHTML = '<div class="warnbox">暂无简报数据：' + escapeHtml(err.message||String(err)) + '</div>';
          }
        });
    }

    var currentFile = getBriefFile();
    updatePageTitle(currentFile);
    loadBrief(currentFile);
  </script>
</body>
</html>
