<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Semi Brief</title>
  <style>
    :root{
      --bg:#f8fafc; --panel:#ffffff; --text:#1e293b; --muted:#64748b;
      --accent:#0ea5e9; --border:#e2e8f0;
      --tag-bg:#f1f5f9; --tag-text:#475569;
      --card-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", sans-serif;
    }
    body{margin:0; background:var(--bg); color:var(--text); font-family:var(--sans)}
    
    .wrap{max-width:1100px; margin:0 auto; padding:24px 16px 60px}
    
    /* Header */
    .topbar{margin-bottom:24px; border-bottom:1px solid var(--border); padding-bottom:16px}
    .title{font-size:24px; font-weight:800; color:#0f172a; letter-spacing:-0.5px}
    .meta{color:var(--muted); font-size:13px; margin-top:8px; display:flex; gap:12px}
    .pill{background:var(--tag-bg); padding:2px 8px; border-radius:6px; border:1px solid var(--border)}

    /* Layout Reset: Single column flow */
    .grid-main{display:block} 
    
    /* Sidebar is now a Top Section */
    .sidebar{position:static; width:100%; margin-bottom:32px; max-height:none}
    
    .headline-card h2{padding:10px 16px; font-size:14px}
    
    /* Headlines as a dense grid (3 columns on PC, 1 on mobile) */
    .headline-list{padding:12px; display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:12px}
    
    /* Keyword row cleanup */
    .keyword-row{margin-top:0; margin-bottom:24px}
    
    /* Search input full width at top */
    .search-row{margin-bottom:16px}
    #q{width:100%; box-sizing:border-box}
    
    /* Mobile tweaks */
    @media (max-width: 900px){
      .grid-main{display:block}
      .headline-list{grid-template-columns:1fr}
      .sidebar{order:0} /* Keep headlines at top */
      .search-container-mobile{display:none !important} /* Hide duplicate mobile search */
      .sidebar .search-row{display:block} /* Show main search */
    }
    .headline{padding:10px 12px; border-radius:6px; transition:background .15s; cursor:pointer; display:block; text-decoration:none; color:inherit}
    .headline:hover{background:#f8fafc}
    .headline .t{font-size:14px; font-weight:600; line-height:1.4; color:#334155}
    .headline .s{font-size:11px; color:#94a3b8; margin-top:4px}
    
    /* Main Content */
    .section-title{font-size:18px; font-weight:700; margin:32px 0 16px; color:#0f172a; padding-bottom:8px; border-bottom:2px solid var(--border)}
    
    .item{background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:24px; margin-bottom:20px; box-shadow:var(--card-shadow)}
    .item .title2{font-size:20px; font-weight:700; color:#0f172a; margin-bottom:8px; line-height:1.4}
    .item .meta{display:flex; gap:12px; font-size:13px; color:var(--muted); margin-bottom:16px; flex-wrap:wrap}
    .item .meta a{color:var(--accent); text-decoration:none}
    
    .summary{background:#f8fafc; padding:16px; border-radius:8px; border-left:4px solid var(--accent); color:#334155; line-height:1.7; font-size:15px; margin-bottom:20px}
    
    .blocks{display:grid; grid-template-columns:1fr 1fr; gap:16px}
    @media (max-width: 700px){.blocks{grid-template-columns:1fr}}
    
    .box{padding:16px; border-radius:8px; font-size:14px; line-height:1.6}
    .box-insight{background:#ecfdf5; border:1px solid #a7f3d0; color:#065f46}
    .box-action{background:#fffbeb; border:1px solid #fcd34d; color:#92400e}
    .box-label{font-weight:700; font-size:11px; text-transform:uppercase; margin-bottom:8px; letter-spacing:0.5px}
    
    .badge{font-size:11px; padding:1px 6px; border-radius:4px; border:1px solid var(--border); background:#fff; color:var(--muted)}
    
    ul{margin:0; padding-left:16px} li{margin-bottom:4px}
    
    /* Search */
    .search-row{margin-bottom:16px}
    #q{width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:8px; font-family:inherit; background:#fff}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <div class="title">Semi Brief</div>
        <div class="meta">
          <span class="pill" id="asof">As of: -</span>
          <span class="pill" id="window">Window: last 72h</span>
          <span class="pill" id="count">Items: -</span>
        </div>
      </div>
    </div>

    <div class="grid-main">
      <!-- Sidebar / Headlines -->
      <div class="sidebar">
        <div class="search-row">
          <input id="q" placeholder="🔍 搜索关键词..." />
        </div>
        
        <div class="headline-card">
          <h2>今日标题总览</h2>
          <div class="headline-list" id="headlines"></div>
        </div>
      </div>

      <!-- Content Area -->
      <div>
        <!-- Mobile Search (Visible only on small screens) -->
        <div class="search-container-mobile" style="display:none">
          <input id="q-mobile" placeholder="🔍 搜索关键词..." style="width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:8px; background:#fff"/>
        </div>

        <!-- Keywords Row (Compact) -->
        <div class="keyword-row">
          <div class="kw-label">本期关键词</div>
          <div id="keywords" style="display:contents"></div>
        </div>
        <div class="warnbox" id="notes" style="display:none;margin-bottom:20px"></div>

        <div class="section-title" id="domestic">国内（中文媒体）</div>
        <div id="domesticItems"></div>

        <div class="section-title" id="overseas">国外（英文媒体）</div>
        <div id="overseasItems"></div>
      </div>
    </div>

    <div class="foot" id="footer" style="margin-top:40px;text-align:center;color:#94a3b8;font-size:12px"></div>
  </div>

  <script>
    const state = { data: null, filtered: null };

    const el = (id)=>document.getElementById(id);
    const escapeHtml = (s)=>String(s||'').replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

    function render(){
      const d = state.filtered || state.data;
      if(!d) return;
      el('asof').textContent = `As of: ${d.asOf || '-'}`;
      el('count').textContent = `Items: ${(d.items||[]).length}`;

      // keywords (compact)
      el('keywords').innerHTML = (d.keywords||[]).map(k=>`<span class="badge">${escapeHtml(k)}</span>`).join(' ');
      
      if(d.notes){
        el('notes').style.display='block';
        el('notes').innerHTML = `<b>说明</b><div style="margin-top:6px;line-height:1.5">${escapeHtml(d.notes)}</div>`;
      }

      // headlines
      el('headlines').innerHTML = (d.items||[]).map((it,idx)=>{
        return `
          <a href="#item-${idx}" class="headline">
            <div class="t">${escapeHtml(it.title)}</div>
            <div class="s">${escapeHtml(it.source||'')} · ${escapeHtml(it.published||'')}</div>
          </a>`;
      }).join('');

      const renderItem = (it, idx)=>{
        return `
          <div class="item" id="item-${idx}">
            <div class="title2">${escapeHtml(it.title)}</div>
            <div class="meta">
              <span>#${idx+1}</span>
              <span>${escapeHtml(it.source||'')}</span>
              <span>${escapeHtml(it.published||'')}</span>
              ${it.url ? `<a href="${escapeHtml(it.url)}" target="_blank" rel="noreferrer">原文链接 ↗</a>`:''}
              ${(it.tags||[]).map(t=>`<span class="badge">${escapeHtml(t)}</span>`).join(' ')}
            </div>
            
            <div class="summary">${escapeHtml(it.summary||'').replace(/\n/g,'<br/>')}</div>
            
            <div class="blocks">
              <div class="box box-insight">
                <div class="box-label">⚡ 行业洞见</div>
                <ul>${[].concat(it.insights||[]).map(x=>`<li>${escapeHtml(x)}</li>`).join('')}</ul>
              </div>
              <div class="box box-action">
                <div class="box-label">🎯 建议动作</div>
                <ul>${[].concat(it.actions||[]).map(x=>`<li>${escapeHtml(x)}</li>`).join('')}</ul>
              </div>
            </div>
          </div>`;
      };

      const domestic = (d.items||[]).filter(x=>x.region==='domestic');
      const overseas = (d.items||[]).filter(x=>x.region==='overseas');
      el('domesticItems').innerHTML = domestic.map(renderItem).join('');
      el('overseasItems').innerHTML = overseas.map(renderItem).join('');

      el('footer').textContent = d.footer || 'Generated by OpenClaw';
    }

    function applyFilter(q){
      q = (q||'').trim().toLowerCase();
      // Sync inputs
      if(el('q').value !== q) el('q').value = q;
      if(el('q-mobile').value !== q) el('q-mobile').value = q;
      
      if(!q){ state.filtered=null; render(); return; }
      const d = state.data;
      const items = (d.items||[]).filter(it=>{
        const hay = [it.title,it.source,it.published,it.summary,(it.insights||[]).join(' '),(it.actions||[]).join(' '),(it.tags||[]).join(' '),(d.keywords||[]).join(' ')].join(' ').toLowerCase();
        return hay.includes(q);
      });
      state.filtered = {...d, items};
      render();
    }

    el('q').addEventListener('input', (e)=>applyFilter(e.target.value));
    el('q-mobile').addEventListener('input', (e)=>applyFilter(e.target.value));

    fetch('./brief.json', {cache:'no-store'}).then(r=>r.json()).then(j=>{state.data=j; render();}).catch(err=>{
      el('headlines').innerHTML = `<div class="warnbox">无法加载 brief.json：${escapeHtml(err.message||String(err))}</div>`;
    });
  </script>
</body>
</html>
