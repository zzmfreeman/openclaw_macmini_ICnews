<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Global Semiconductor News Brief | 全球半导体新闻简报</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563eb;
      --primary-light: #eff6ff;
      --text: #1e293b;
      --text-light: #64748b;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --border: #e2e8f0;
      --insight-bg: #fffbeb;
      --insight-border: #fcd34d;
      --insight-text: #92400e;
      --action-bg: #f0fdf4;
      --action-border: #86efac;
      --action-text: #166534;
    }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    header {
      text-align: center;
      margin-bottom: 40px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 20px;
    }
    h1 {
      font-size: 2.5rem;
      margin: 0 0 10px 0;
      color: var(--text);
    }
    .date {
      color: var(--text-light);
      font-size: 1rem;
    }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }
    .tag {
      background: var(--primary-light);
      color: var(--primary);
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    h2 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
      flex: 1;
      padding-right: 16px;
    }
    .summary {
      color: var(--text);
      font-size: 1rem;
      margin-bottom: 20px;
    }
    .meta {
      font-size: 0.875rem;
      color: var(--text-light);
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }
    .meta a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }
    .meta a:hover {
      text-decoration: underline;
    }
    .blocks {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 640px) {
      .blocks {
        grid-template-columns: 1fr;
      }
    }
    .block {
      padding: 16px;
      border-radius: 8px;
      font-size: 0.9rem;
    }
    .insight {
      background: var(--insight-bg);
      border: 1px solid var(--insight-border);
      color: var(--insight-text);
    }
    .action {
      background: var(--action-bg);
      border: 1px solid var(--action-border);
      color: var(--action-text);
    }
    .block-title {
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.75rem;
      margin-bottom: 8px;
      opacity: 0.9;
    }
    ul {
      margin: 0;
      padding-left: 20px;
    }
    li {
      margin-bottom: 4px;
    }
    footer {
      text-align: center;
      margin-top: 60px;
      color: var(--text-light);
      font-size: 0.875rem;
    }
  </style>
</head>
<body>

<div class="container">

</div>

      "summary": "受以色列地缘局势影响，晶圆代工厂Tower Semiconductor面临出货阻力。3DNews及供应链媒体指出，主要客户包括安森美、英特尔、三星等已启动转单计划，成熟制程供应链或迎变局。",

  function render() {
    const container = document.getElementById('content');
    if (!data || data.length === 0) {
      container.innerHTML = '<p style="text-align:center">暂无数据</p>';
      return;
    }

    const html = data.map(function(item) {
      var insightsHtml = '';
      if (item.insights && item.insights.length) {
        insightsHtml = '<div class="block insight"><div class="block-title">💡 行业洞见</div><ul>' + 
          item.insights.map(function(i){ return '<li>' + i + '</li>'; }).join('') + 
          '</ul></div>';
      }

      var actionsHtml = '';
      if (item.actions && item.actions.length) {
        actionsHtml = '<div class="block action"><div class="block-title">🎯 建议动作</div><ul>' + 
          item.actions.map(function(a){ return '<li>' + a + '</li>'; }).join('') + 
          '</ul></div>';
      }

      var linkHtml = item.url ? '<a href="' + item.url + '" target="_blank" rel="noopener noreferrer">🔗 原文链接 &rarr;</a>' : '';

      return '<div class="card">' +
        '<div class="card-header"><span class="tag">' + item.category + '</span></div>' +
        '<h2>' + item.title + '</h2>' +
        '<div class="meta"><span>📰 ' + item.source + '</span>' + linkHtml + '</div>' +
        '<p class="summary">' + item.summary + '</p>' +
        '<div class="blocks">' + insightsHtml + actionsHtml + '</div>' +
        '</div>';
    }).join('');

    container.innerHTML = html;
  }

  // Run immediately
  render();
</script>

</body>
</html>
