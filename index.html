<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Semi Midday Flash</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#fffbeb; /* Warmer background for midday */
      --panel:#ffffff; --text:#1e293b; --muted:#64748b;
      --accent:#f59e0b; /* Amber accent for flash */
      --tag-bg:#f1f5f9; --tag-text:#475569;
      --card-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      --sans: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", sans-serif;
    }
    body{margin:0; background:var(--bg); color:var(--text); font-family:var(--sans)}
    
    .wrap{max-width:1100px;margin:0 auto;padding:40px 24px 60px}
    .topbar{margin-bottom:32px; border-bottom:1px solid var(--border); padding-bottom:24px; text-align:center}
    .title{font-size:32px; font-weight:700; color:#1e293b; letter-spacing:-0.5px; margin-bottom:16px}
    .meta{display:flex; justify-content:center; gap:20px; font-size:14px; opacity:0.9; color:var(--muted)}
    .pill{background:#fff; border:1px solid #cbd5e1; padding:4px 12px; border-radius:999px; color:#475569; font-weight:500}

    /* Grid Layout */
    .grid-main{display:grid; grid-template-columns: 1fr; gap:32px}
    
    /* Headlines Section (Top Grid) */
    .headline-card{background:#fff; border:1px solid #e2e8f0; border-radius:12px; box-shadow:0 4px 6px -1px rgb(0 0 0 / 0.05); padding:20px}
    .headline-card h2{margin:0; padding:0 0 16px; margin-bottom:16px; background:none; font-size:18px; font-weight:700; color:#334155; border-bottom:2px solid #2563eb}
    .headline-list{display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:16px; padding:0}
    .headline{background:#f8fafc; border:1px solid #e2e8f0; padding:16px; border-radius:8px; transition:transform 0.2s, box-shadow 0.2s; display:block; text-decoration:none; color:inherit}
    .headline:hover{transform:translateY(-2px); box-shadow:0 4px 6px -1px rgb(0 0 0 / 0.1); background:#fff}
    .headline .t{font-size:15px; font-weight:600; color:#1e293b; line-height:1.5}
    .headline .s{font-size:12px; color:#94a3b8; margin-top:4px}
    
    /* Keyword Row */
    .keyword-row{margin-bottom:24px; padding:16px; background:#fff; border:1px solid #e2e8f0; border-radius:8px; display:flex; flex-wrap:wrap; gap:8px; align-items:center}
    .kw-label{font-size:13px; font-weight:700; color:#64748b; text-transform:uppercase; margin-right:12px}
    
    /* Item Card Styling (Mimicking Reference) */
    .item{background:#fff; border:none; border-left:4px solid #2563eb; border-radius:8px; padding:24px; margin-bottom:24px; box-shadow:0 2px 4px rgb(0 0 0 / 0.05); transition:transform 0.2s}
    .item:hover{transform:translateX(4px); box-shadow:0 4px 6px rgb(0 0 0 / 0.08)}
    
    .item .header{margin-bottom:16px}
    .item .title2{font-size:22px; font-weight:600; color:#1e293b; margin-bottom:10px; line-height:1.4}
    .item .meta-row{display:flex; gap:12px; align-items:center; flex-wrap:wrap; font-size:13px; color:#64748b}
    .item .meta-row a{color:#2563eb; text-decoration:none; font-weight:500}
    .item .meta-row a:hover{text-decoration:underline}
    
    .badge{font-size:12px; padding:2px 10px; border-radius:12px; font-weight:500; border:none; display:inline-block}
    .badge.domestic{background:#eff6ff; color:#1d4ed8} /* Blue tint */
    .badge.overseas{background:#f5f3ff; color:#7c3aed} /* Purple tint */
    .badge-tag{background:#f1f5f9; color:#475569; border:1px solid #e2e8f0}
    
    /* Data & Timeline Section */
    .data-grid{display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-bottom:40px}
    @media (max-width: 700px){.data-grid{grid-template-columns:1fr}}
    
    .data-card{background:#fff; border:1px solid #e2e8f0; border-radius:12px; padding:20px; box-shadow:0 2px 4px rgb(0 0 0 / 0.05)}
    .data-card h3{margin:0 0 16px; font-size:16px; color:#1e293b; display:flex; align-items:center; gap:8px}
    
    .key-data-list{display:grid; gap:12px}
    .key-data-item{display:flex; justify-content:space-between; align-items:center; padding-bottom:8px; border-bottom:1px dashed #e2e8f0}
    .key-data-metric{color:#64748b; font-size:14px}
    .key-data-value{font-weight:700; color:#2563eb; font-size:16px}
    
    .timeline-list{border-left:2px solid #e2e8f0; padding-left:20px; margin-left:8px}
    .timeline-item{position:relative; margin-bottom:20px}
    .timeline-item::before{content:''; position:absolute; left:-25px; top:6px; width:8px; height:8px; background:#fff; border:2px solid #2563eb; border-radius:50%}
    .timeline-date{font-size:12px; color:#64748b; font-weight:700; margin-bottom:4px}
    .timeline-event{font-size:14px; color:#334155; line-height:1.5}

    .summary ul{margin:0; padding-left:18px}
    .summary li{margin-bottom:6px; color:#334155; line-height:1.6}
    @media (max-width: 700px){.blocks{grid-template-columns:1fr}}
    
    .box{padding:20px; border-radius:8px; font-size:15px; line-height:1.6; border:none}
    .box-insight{background:#fffbeb; border-left:3px solid #f59e0b; color:#92400e} /* Yellow/Amber for Insights */
    .box-insight .lbl{color:#b45309; font-weight:700; font-size:12px; text-transform:uppercase; margin-bottom:8px; letter-spacing:0.5px}
    
    .box-action{background:#f0fdf4; border-left:3px solid #10b981; color:#166534} /* Green for Actions */
    .box-action .lbl{color:#15803d; font-weight:700; font-size:12px; text-transform:uppercase; margin-bottom:8px; letter-spacing:0.5px}
    
    /* Glossary Section */
    .glossary-box{margin-top:20px; padding:16px; background:#f8fafc; border:1px dashed #cbd5e1; border-radius:8px}
    .glossary-title{font-size:12px; font-weight:700; color:#64748b; text-transform:uppercase; margin-bottom:8px; display:flex; align-items:center; gap:6px}
    .glossary-item{font-size:13px; color:#475569; margin-bottom:6px; line-height:1.5}
    .glossary-term{font-weight:700; color:#334155; background:#e2e8f0; padding:1px 6px; border-radius:4px; margin-right:6px; font-size:12px}

    .section-title{font-size:20px; font-weight:600; border-bottom:3px solid #2563eb; padding-bottom:8px; margin:40px 0 24px; color:#1e293b; display:inline-block; display:flex; align-items:center; gap:8px}
    
    ul{margin:0; padding-left:18px} 
    li{margin-bottom:6px; padding-left:4px}
    
    /* Search */
    .search-row{margin-bottom:16px}
    #q{width:100%; padding:12px 16px; border:1px solid #cbd5e1; border-radius:8px; font-family:inherit; background:#fff; font-size:14px; box-sizing:border-box}
    #q:focus{outline:none; border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,0.1)}
    
    .foot{margin-top:40px; text-align:center; color:#94a3b8; font-size:12px; padding-top:20px; border-top:1px solid #e2e8f0}
    
    /* Mobile tweaks */
    @media (max-width: 900px){
      .headline-list{grid-template-columns:1fr}
      .search-container-mobile{display:none !important}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <div class="title">☀️ 早间半导体简报</div><div id="buildmeta" style="margin-top:8px;font-size:13px;color:#64748b"></div>
        <div class="meta">
          <a href="index.html" class="pill">⬅️ 返回早报</a>
          <span id="asof">As of: -</span>
          <span id="window">Window: last 72h</span>
          <span id="count">Items: -</span>
        </div>
      </div>
    </div>

    <div class="grid-main">
      <!-- Search & Headlines -->
      <div class="sidebar">
        <div class="search-row">
          <input id="q" placeholder="🔍 搜索标题、摘要、洞见..." />
        </div>
        
        <div class="headline-card">
          <h2>🔥 今日标题总览</h2>
          <div class="headline-list" id="headlines"></div>
        </div>
      </div>

      <!-- Content Area -->
      <div>
        <!-- Keywords Row -->
        <div class="keyword-row">
          <div class="kw-label">🏷️ 本期关键词</div>
          <div id="keywords" style="display:contents"></div>
        </div>
        
        <!-- Data & Timeline -->
        <div class="data-grid" id="dataSection" style="display:none">
          <div class="data-card">
            <h3>📊 关键数据</h3>
            <div class="key-data-list" id="keyData"></div>
          </div>
          <div class="data-card">
            <h3>📅 产业时间线</h3>
            <div class="timeline-list" id="timeline"></div>
          </div>
        </div>

        <div class="warnbox" id="notes" style="display:none;margin-bottom:20px;padding:12px;background:#fff1f2;border:1px solid #fecdd3;border-radius:8px;color:#9f1239"></div>

        <div class="section-title" id="domestic">🇨🇳 国内（中文媒体）</div>
        <div id="domesticItems"></div>

        <div class="section-title" id="overseas">🌍 国外（英文媒体）</div>
        <div id="overseasItems"></div>
      </div>
    </div>

    <div class="foot" id="footer">Generated by OpenClaw</div>
  </div>

  <script>
    const state = { data: null, filtered: null };

    const el = (id)=>document.getElementById(id);
    const escapeHtml = (s)=>String(s||'').replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

    function render(){
      const d = state.filtered || state.data;
      if(!d) return;
      
      // Safety Checks for data structure based on Self-Reflection
      if (!d.items) d.items = [];
      d.items = d.items.filter(it => it.region === 'domestic' || it.region === 'overseas'); // Ensure valid region
      if (d.items.length === 0) {
        el('domesticItems').innerHTML = '<div class="warnbox">暂无符合条件的国内新闻。请检查数据源 (region 字段)。</div>';
        el('overseasItems').innerHTML = '<div class="warnbox">暂无符合条件的国外新闻。请检查数据源 (region 字段)。</div>';
      }

      el('asof').textContent = `📅 更新时间: ${d.asOf || '-'}`;
      if (d.version || d.generatedAt || d.footer) {
        const meta = d.footer || `版本号(${d.version||'-'})｜生成时间(${d.generatedAt||'-'})`;
        const bm = el('buildmeta'); if (bm) bm.textContent = meta;
      }
      el('count').textContent = `📊 新闻数量: ${(d.items||[]).length}`;

      // keywords
      el('keywords').innerHTML = (d.keywords||[]).map(k=>`<span class="badge badge-tag">${escapeHtml(k)}</span>`).join(' ');
      
      // Key Data & Timeline
      if(d.key_data && d.key_data.length){
        el('dataSection').style.display = 'grid';
        el('keyData').innerHTML = d.key_data.map(k=>`
          <div class="key-data-item">
            <span class="key-data-metric">${escapeHtml(k.metric)}</span>
            <span class="key-data-value">${escapeHtml(k.value)}</span>
          </div>`).join('');
      }
      if(d.timeline && d.timeline.length){
        el('timeline').innerHTML = d.timeline.map(t=>`
          <div class="timeline-item">
            <div class="timeline-date">${escapeHtml(t.date)}</div>
            <div class="timeline-event">${escapeHtml(t.event)}</div>
          </div>`).join('');
      }
      
      if(d.notes){
        el('notes').style.display='block';
        el('notes').innerHTML = `<b>⚠️ 说明</b><div style="margin-top:6px;line-height:1.5">${escapeHtml(d.notes)}</div>`;
      }

      // headlines
      el('headlines').innerHTML = (d.items||[]).map((it,idx)=>{
        return `
          <a href="#item-${idx}" class="headline">
            <div class="t">${escapeHtml(it.title)}</div>
            <div class="s">${escapeHtml(it.source||'')} · ${escapeHtml(it.published||'')}</div>
          </a>`;
      }).join('');

      const renderItem = (it, idx)=>{
        return `
          <div class="item" id="item-${idx}">
            <div class="header">
              <div class="title2">${escapeHtml(it.title)}</div>
              <div class="meta-row">
                <span>#${idx+1}</span>
                <span>📰 ${escapeHtml(it.source||'')}</span>
                <span>📅 ${escapeHtml(it.published||'')}</span>
                ${it.url ? `<a href="${escapeHtml(it.url)}" target="_blank" rel="noreferrer">🔗 原文链接</a>`:''}
                ${(it.tags||[]).map(t=>`<span class="badge badge-tag">${escapeHtml(t)}</span>`).join(' ')}
              </div>
            </div>
            
            <div class="summary">${it.summary}</div>
            
            <div class="blocks">
              <div class="box box-insight">
                <div class="lbl">💡 行业洞见</div>
                <ul>${[].concat(it.insights||[]).map(x=>`<li>${escapeHtml(x)}</li>`).join('')}</ul>
              </div>
              <div class="box box-action">
                <div class="lbl">🎯 建议动作</div>
                <ul>${[].concat(it.actions||[]).map(x=>`<li>${escapeHtml(x)}</li>`).join('')}</ul>
              </div>
            </div>
          </div>
          
          ${it.glossary && it.glossary.length ? `
          <div class="glossary-box">
            <div class="glossary-title">📚 核心词条解读</div>
            ${it.glossary.map(g => `<div class="glossary-item"><span class="glossary-term">${escapeHtml(g.term)}</span>${escapeHtml(g.desc)}</div>`).join('')}
          </div>` : ''}
          `;
      };

      const domestic = (d.items||[]).filter(x=>x.region==='domestic');
      const overseas = (d.items||[]).filter(x=>x.region==='overseas');
      el('domesticItems').innerHTML = domestic.map(renderItem).join('');
      el('overseasItems').innerHTML = overseas.map(renderItem).join('');

      el('footer').textContent = d.footer || 'Generated by OpenClaw · Data source: NewsAPI/Brave';
    }

    function applyFilter(q){
      q = (q||'').trim().toLowerCase();
      if(!q){ state.filtered=null; render(); return; }
      const d = state.data;
      const items = (d.items||[]).filter(it=>{
        const hay = [it.title,it.source,it.published,it.summary,(it.insights||[]).join(' '),(it.actions||[]).join(' '),(it.tags||[]).join(' '),(d.keywords||[]).join(' ')].join(' ').toLowerCase();
        return hay.includes(q);
      });
      state.filtered = {...d, items};
      render();
    }

    el('q').addEventListener('input', (e)=>applyFilter(e.target.value));

    fetch('./brief.json?v=202603100600', {cache:'no-store'}).then(r=>r.json()).then(j=>{state.data=j; render();}).catch(err=>{
      el('headlines').innerHTML = `<div class="warnbox">暂无早间简报数据 (brief.json)：${escapeHtml(err.message||String(err))}</div>`;
    });
  </script>
</body>
</html>
